name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: oven-sh/setup-bun@v2
    - name: Install dependencies
      run: bun install --frozen-lockfile
    - name: Install Playwright Browsers
      run: bunx playwright install --with-deps chromium
    - name: Run Type Check
      run: bun run type-check
    - name: Run Playwright tests
      run: bun run test -- --project=chromium
      env:
        MENTOR_EMAIL: ${{ secrets.MENTOR_EMAIL }}
        MENTOR_PASSWORD: ${{ secrets.MENTOR_PASSWORD }}
        EMPTY_MENTOR_EMAIL: ${{ secrets.EMPTY_MENTOR_EMAIL }}
        EMPTY_MENTOR_PASSWORD: ${{ secrets.EMPTY_MENTOR_PASSWORD }}
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
